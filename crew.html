<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Crew — Guatemala 2026</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <header class="mini-hero">
    <div class="mini-hero-bg"></div>
    <div class="mini-hero-gradient"></div>
    <div class="mini-hero-content">
      <p class="mini-hero-eyebrow">Guatemala 2026</p>
      <h1 class="mini-hero-title">The Crew</h1>
    </div>
  </header>

  <nav class="sticky-nav">
    <a class="nav-logo" href="index.html">GT '26</a>
    <a href="index.html#itinerary">Itinerary</a>
    <a href="index.html#packing">Packing</a>
    <a href="index.html#food">Food</a>
    <a href="index.html#tips">Tips</a>
    <div class="nav-spacer"></div>
    <a href="crew.html" class="nav-active">The Crew</a>
    <a href="facts.html">Facts</a>
    <a href="docs.html">The Vault</a>
  </nav>

  <section class="section section-border">
    <div class="container">
      <div class="section-header-row">
        <div class="section-header">
          <p class="section-label"><span>People</span></p>
          <h2 class="section-title">Who's Coming</h2>
          <p class="section-sub">Add yourself. Click a card to edit your info.</p>
        </div>
        <button class="btn-primary" onclick="addCrewMember()">+ Add Member</button>
      </div>

      <div class="crew-grid" id="crewGrid"></div>
      <div class="crew-stats" id="crewStats"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <p class="footer-title">Guatemala '26</p>
        <p class="footer-sub">May 22–25 · Antigua · Acatenango</p>
      </div>
      <div class="footer-links">
        <a href="index.html">Home</a>
        <a href="facts.html">Facts</a>
        <a href="docs.html">The Vault</a>
      </div>
    </div>
  </footer>

  <script>
    const dot = document.getElementById('cursorDot');
    const ring = document.getElementById('cursorRing');
    document.addEventListener('mousemove', e => {
      dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
      ring.style.left = e.clientX + 'px'; ring.style.top = e.clientY + 'px';
    });

    const CREW_KEY = 'guat2026_crew';
    const defaultCrew = [
      { name: 'Shannon', emoji: '🧗', role: 'Trip Organizer', hype: "Let's get it.", confirmed: true, color: '#ff4d1a' }
    ];
    const emojiOptions = ['🧗','🏕️','🌋','🥾','🎒','🦅','⛰️','🌄','🔥','🏔️','🌿','💪','📸','🌊','⭐'];
    const colorOptions = ['#ff4d1a','#4fd896','#f0c040','#4f93d8','#c07dff','#ff6b6b','#ffd166','#06d6a0'];

    function loadCrew() {
      const s = localStorage.getItem(CREW_KEY);
      return s ? JSON.parse(s) : defaultCrew;
    }
    function saveCrew(c) { localStorage.setItem(CREW_KEY, JSON.stringify(c)); }

    function renderCrew() {
      const crew = loadCrew();
      document.getElementById('crewGrid').innerHTML = crew.map((m, i) => `
        <div class="crew-card" style="--card-color:${m.color}">
          <div class="crew-emoji">${m.emoji}</div>
          <div class="crew-confirmed ${m.confirmed ? 'confirmed-yes' : 'confirmed-no'}">
            ${m.confirmed ? 'Confirmed' : 'TBD'}
          </div>
          <h3 class="crew-name">${m.name}</h3>
          <p class="crew-role">${m.role}</p>
          <p class="crew-hype">"${m.hype}"</p>
          <div class="crew-actions">
            <button class="crew-btn" onclick="editMember(${i})">Edit</button>
            <button class="crew-btn crew-btn-del" onclick="deleteMember(${i})">Remove</button>
          </div>
        </div>`).join('');

      const confirmed = crew.filter(c => c.confirmed).length;
      document.getElementById('crewStats').innerHTML = `
        <div class="stat"><span class="stat-num">${crew.length}</span><span class="stat-label">Total</span></div>
        <div class="stat"><span class="stat-num">${confirmed}</span><span class="stat-label">Confirmed</span></div>
        <div class="stat"><span class="stat-num">${crew.length - confirmed}</span><span class="stat-label">TBD</span></div>`;

      document.querySelectorAll('a,button,.crew-card').forEach(el => {
        el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
        el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
      });
    }

    function addCrewMember() {
      showModal(-1, { name:'', emoji:'🎒', role:'', hype:'', confirmed:false, color: colorOptions[Math.floor(Math.random()*colorOptions.length)] });
    }
    function editMember(i) { showModal(i, loadCrew()[i]); }
    function deleteMember(i) {
      if (!confirm('Remove?')) return;
      const crew = loadCrew(); crew.splice(i, 1); saveCrew(crew); renderCrew();
    }

    function showModal(index, m) {
      document.getElementById('crewModal')?.remove();
      const modal = document.createElement('div');
      modal.id = 'crewModal';
      modal.className = 'modal-overlay';
      modal.innerHTML = `
        <div class="modal">
          <h3>${index === -1 ? 'Add Member' : 'Edit Member'}</h3>
          <div class="modal-form">
            <label>Name</label>
            <input type="text" id="m-name" value="${m.name}" placeholder="Your name" />
            <label>Role / Vibe</label>
            <input type="text" id="m-role" value="${m.role}" placeholder="e.g. The Photographer" />
            <label>Hype Quote</label>
            <input type="text" id="m-hype" value="${m.hype}" placeholder="Why you're pumped" />
            <label>Emoji</label>
            <div class="emoji-picker">${emojiOptions.map(e => `<span class="emoji-opt ${e===m.emoji?'emoji-sel':''}" onclick="selEmoji(this,'${e}')">${e}</span>`).join('')}</div>
            <input type="hidden" id="m-emoji" value="${m.emoji}" />
            <label>Color</label>
            <div class="color-picker">${colorOptions.map(c => `<span class="color-opt ${c===m.color?'color-sel':''}" style="background:${c}" onclick="selColor(this,'${c}')"></span>`).join('')}</div>
            <input type="hidden" id="m-color" value="${m.color}" />
            <label class="check-label"><input type="checkbox" id="m-conf" ${m.confirmed?'checked':''} /> Confirmed going</label>
          </div>
          <div class="modal-actions">
            <button class="btn-primary" onclick="saveMember(${index})">Save</button>
            <button class="btn-ghost"   onclick="document.getElementById('crewModal').remove()">Cancel</button>
          </div>
        </div>`;
      document.body.appendChild(modal);
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    }

    function selEmoji(el, e) { document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('emoji-sel')); el.classList.add('emoji-sel'); document.getElementById('m-emoji').value = e; }
    function selColor(el, c) { document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('color-sel')); el.classList.add('color-sel'); document.getElementById('m-color').value = c; }

    function saveMember(index) {
      const name = document.getElementById('m-name').value.trim();
      if (!name) { alert('Add a name!'); return; }
      const m = { name, role: document.getElementById('m-role').value.trim() || 'Crew Member', hype: document.getElementById('m-hype').value.trim() || "Let's go.", emoji: document.getElementById('m-emoji').value, color: document.getElementById('m-color').value, confirmed: document.getElementById('m-conf').checked };
      const crew = loadCrew();
      if (index === -1) crew.push(m); else crew[index] = m;
      saveCrew(crew); document.getElementById('crewModal').remove(); renderCrew();
    }

    renderCrew();
  </script>
</body>
</html>
